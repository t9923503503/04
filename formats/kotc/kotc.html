<body>

  <!-- ═══════════════════════════════════════════════════════
       TOP NAVIGATION
       ══════════════════════════════════════════════════════= -->
  <nav class="fmt-nav" id="kotc-nav">
    <button class="fmt-nav-back" id="kotc-back-btn">← Хаб</button>
    <span class="fmt-nav-title" id="kotc-nav-title">👑 King of the Court</span>
    <div class="fmt-nav-sep"></div>
    <div class="pill-tabs" id="kotc-round-tabs" role="tablist" aria-label="Раунды"></div>
  </nav>

  <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT
       ══════════════════════════════════════════════════════= -->
  <main class="fmt-content" id="kotc-main">

    <!-- Session info bar -->
    <div class="session-info-bar" id="kotc-info-bar">
      <span id="kotc-info-text">Загрузка…</span>
      <span class="session-info-badge" id="kotc-phase-badge"></span>
    </div>

    <!-- Court tabs for Stage 1 -->
    <div class="kotc-court-tabs" id="kotc-court-tabs-wrap" style="display:none">
      <div class="pill-tabs" id="kotc-court-tabs" role="tablist" aria-label="Корты"></div>
    </div>

    <!-- Division tabs for Stage 2 -->
    <div class="kotc-div-tabs" id="kotc-div-tabs-wrap" style="display:none">
      <div class="pill-tabs" id="kotc-div-tabs" role="tablist" aria-label="Дивизионы"></div>
    </div>

    <!-- ── PANELS (only one active at a time) ── -->

    <!-- ROSTER PANEL: assign players to 4 courts -->
    <div id="kotc-roster-panel" class="kotc-panel active">
      <div id="kotc-roster-content"></div>
    </div>

    <!-- COURTS PANEL: score entry Stage 1 -->
    <div id="kotc-courts-panel" class="kotc-panel">
      <div id="kotc-courts-content"></div>
    </div>

    <!-- STANDINGS PANEL: global rankings after Stage 1 -->
    <div id="kotc-standings-panel" class="kotc-panel">
      <div id="kotc-standings-content"></div>
    </div>

    <!-- DIVISIONS PANEL: Stage 2 play within divisions -->
    <div id="kotc-divisions-panel" class="kotc-panel">
      <div id="kotc-divisions-content"></div>
    </div>

    <!-- FINISHED PANEL: final results + export -->
    <div id="kotc-finished-panel" class="kotc-panel">
      <div id="kotc-finished-content"></div>
    </div>

  </main>

  <!-- Bottom action bar -->
  <div class="fmt-action-bar" id="kotc-action-bar" style="display:none"></div>

       SCRIPTS
       ══════════════════════════════════════════════════════= -->

</body>
</html>

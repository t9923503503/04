<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.5" stop-color="#1B1230"/>
      <stop offset="1" stop-color="#0E0B18"/>
    </linearGradient>
    <radialGradient id="spot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(820 150) rotate(90) scale(240 360)">
      <stop offset="0" stop-color="#A855F7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-40" y="-40" width="1280" height="500" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <circle cx="820" cy="150" r="240" fill="url(#spot)" filter="url(#blur)"/>

  <!-- abstract court -->
  <g opacity="0.5" stroke="#E5E7EB" stroke-opacity="0.35">
    <rect x="220" y="205" width="760" height="165" rx="16"/>
    <path d="M600 205V370"/>
  </g>

  <!-- shuffle arrows -->
  <g opacity="0.95" stroke="#C084FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M340 135C420 95 480 95 560 135"/>
    <path d="M560 135L536 115"/>
    <path d="M560 135L532 150"/>
    <path d="M860 135C780 175 720 175 640 135"/>
    <path d="M640 135L664 115"/>
    <path d="M640 135L668 150"/>
    <path d="M420 285C500 325 560 325 640 285"/>
    <path d="M640 285L616 265"/>
    <path d="M640 285L612 300"/>
    <path d="M780 285C700 245 640 245 560 285"/>
    <path d="M560 285L584 265"/>
    <path d="M560 285L588 300"/>
  </g>

  <!-- player dots -->
  <g opacity="0.9">
    <circle cx="360" cy="210" r="14" fill="#E9D5FF"/>
    <circle cx="410" cy="260" r="14" fill="#FDE68A"/>
    <circle cx="520" cy="235" r="14" fill="#DDD6FE"/>
    <circle cx="680" cy="235" r="14" fill="#DDD6FE"/>
    <circle cx="790" cy="260" r="14" fill="#FDE68A"/>
    <circle cx="840" cy="210" r="14" fill="#E9D5FF"/>
  </g>

  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="700" letter-spacing="0.08em" opacity="0.85">
    <text x="260" y="160" font-size="18" fill="#E9D5FF">ПАРЫ</text>
    <text x="260" y="182" font-size="18" fill="#E9D5FF">МЕНЯЮТСЯ</text>
  </g>
</svg>
